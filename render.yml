services:
  - type: web
    name: pronscraper
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    healthCheckPath: /status
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
```

